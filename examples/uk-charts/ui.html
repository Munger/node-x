<!DOCTYPE html>
<!--
@file ui.html

@brief D3 v7 force-graph front-end for the UK Charts Explorer.

The server owns the BFS queue and streams nodes via SSE; this page
renders what arrives and issues POST /explore/<id> when the user
clicks a node.

Endpoints used
──────────────
GET  /root          — reset server graph; root node arrives via SSE
GET  /stream        — EventSource: node / expanded / status / done / heartbeat
POST /explore/<id>  — push a node onto the server BFS queue
POST /pause         — suspend workers
POST /resume        — resume workers
POST /stop          — drain queue without resetting graph
GET  /stats/<id>    — lazy-fetch chart stats for a release (tooltip)

@copyright Copyright (c) 2026 Tim Hosking
@par Licence: MIT
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>UK Charts Explorer</title>
<link rel="stylesheet" href="/ui.css">
<script src="/prefs.js"></script>
</head>
<body>

<div id="toolbar">
  <h1>UK CHARTS EXPLORER</h1>
  <div class="tb-sep"></div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search artist…" autocomplete="off">
    <div id="search-results"></div>
  </div>
  <div class="chart-toggle">
    <button id="tog-albums"             onclick="setChart('albums')">Albums</button>
    <button id="tog-singles"            onclick="setChart('singles')">Singles</button>
    <button id="tog-both"  class="active" onclick="setChart('both')">Both</button>
  </div>
  <button id="pause-btn" class="tb-btn" onclick="togglePause()">Pause</button>
  <button id="stop-btn"  class="tb-btn" onclick="stopCascade()">Stop</button>
  <button id="reset-btn"   class="tb-btn" onclick="resetGraph()">Reset</button>
  <button id="restart-btn" class="tb-btn tb-danger" onclick="restartServer()">Restart Server</button>
  <span id="status-text">Initialising…</span>
</div>

<div id="canvas">
  <svg id="svg">
    <g id="zoom-g">
      <g id="link-g"></g>
      <g id="node-g"></g>
    </g>
  </svg>

  <div id="leg">
    <div><span style="background:#FFD700"></span>timeline</div>
    <div><span style="background:#CC8800"></span>decade</div>
    <div><span style="background:#FF6D00"></span>year</div>
    <div><span style="background:#E53935"></span>month</div>
    <div><span style="background:#3949ab"></span>albums week</div>
    <div><span style="background:#6a1b9a"></span>singles week</div>
    <div><span style="background:#4CAF50"></span>artist</div>
    <div><span style="background:#A5D6A7"></span>album</div>
    <div><span style="background:#80DEEA"></span>single</div>
  </div>

  <div id="queue-bar"></div>
  <div id="act"></div>
  <div id="tip"></div>
</div>

<div id="console-panel">
  <div id="console-toolbar">
    <span class="con-title">Console</span>
    <button class="con-btn" onclick="document.getElementById('console-lines').innerHTML=''">Clear</button>
  </div>
  <div id="console-lines"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
"use strict";

// ── Colour and radius ──────────────────────────────────────────────────────
//
// Carried by each node as rendering.node_colour / rendering.node_radius.
// Prefs.get("nodeColour") provides a user-override layer.

const colour = d => {
  if (typeof d === "string") return Prefs.get("nodeColour", d) || "#555";
  return Prefs.get("nodeColour", d.rendering.colour_key) || d.rendering.node_colour || "#555";
};

const radius = d => {
  if (typeof d === "string") return Prefs.get("nodePhysics", d)?.node_radius || 6;
  return d.rendering.node_radius || 6;
};

// ── D3 setup ───────────────────────────────────────────────────────────────

const svg      = d3.select("#svg");
const zoomG    = d3.select("#zoom-g");
const linkG    = d3.select("#link-g");
const nodeG    = d3.select("#node-g");
const tipEl    = document.getElementById("tip");
const actEl    = document.getElementById("act");
const qBar     = document.getElementById("queue-bar");
const statusEl = document.getElementById("status-text");

const W = () => document.getElementById("canvas").clientWidth;
const H = () => document.getElementById("canvas").clientHeight;

// Zoom behaviour — D3 zoom applied to the inner <g> so nodes keep their positions.
const zoomBeh = d3.zoom()
  .scaleExtent([0.02, 8])
  .on("zoom", e => zoomG.attr("transform", e.transform));
svg.call(zoomBeh);
svg.on("click", () => { tipEl.style.display = "none"; });

// ── Simulation parameters ──────────────────────────────────────────────────

// Global sim params read from Prefs once at startup; per-node physics comes
// directly from node attributes sent by the server.
const SIM = Prefs.get("simulation");

function linkStyle(sel) {
  sel
    .attr("stroke", d => {
      const key = `${d.source.node_type}-${d.target.node_type}`;
      return Prefs.get("linkColour", key) || "#333";
    })
    .attr("stroke-width", d => d.target.physics.link_width);
}

// ── Angular spring force ────────────────────────────────────────────────────
//
// angle_spring on the PARENT drives how strictly its children are distributed
// evenly around it.  Strict (>= 5): position is snapped in tick() after D3's
// own integration, so the constraint is never undone.  Soft (< 5): spring
// force applied during the force step.
// radial_spring on the CHILD resists being pulled away from target_radius.
//
// _asfNodes / _nodeById / _siblingAngles are module-level so tick() can
// apply the strict spoke constraint after D3 finishes updating positions.

let _asfNodes = [];
const _nodeById     = new Map();
const _siblingAngles = new Map();

function _rebuildAngles() {
  const childrenOf = new Map();
  for (const n of _asfNodes) {
    if (n.parent_id == null) continue;
    if (!childrenOf.has(n.parent_id)) childrenOf.set(n.parent_id, []);
    childrenOf.get(n.parent_id).push(n.id);
  }
  _siblingAngles.clear();
  for (const [, ids] of childrenOf) {
    const sorted = [...ids].sort((a, b) =>
      (_nodeById.get(a)?.sort_index ?? 0) - (_nodeById.get(b)?.sort_index ?? 0)
    );
    const total = sorted.length;
    sorted.forEach((id, i) =>
      _siblingAngles.set(id, (i / total) * 2 * Math.PI - Math.PI / 2)
    );
  }
}

function angularSpringForce() {
  function force(alpha) {
    for (const n of _asfNodes) {
      const parent = n.parent_id != null ? _nodeById.get(n.parent_id) : null;
      if (!parent) continue;
      const dx = n.x - parent.x, dy = n.y - parent.y;
      const r  = Math.sqrt(dx * dx + dy * dy);
      if (r < 1) continue;

      // Soft angular spring only — strict is handled in tick() post-integration.
      const aStr = parent.physics?.angle_spring ?? 0;
      if (aStr > 0 && aStr < 5) {
        const homeAngle = _siblingAngles.get(n.id);
        if (homeAngle != null) {
          const θ = Math.atan2(dy, dx);
          let dθ = homeAngle - θ;
          while (dθ >  Math.PI) dθ -= 2 * Math.PI;
          while (dθ < -Math.PI) dθ += 2 * Math.PI;
          const af = dθ * aStr * alpha;
          n.vx += -Math.sin(θ) * af;
          n.vy +=  Math.cos(θ) * af;
        }
      }

      const rStr = n.physics?.radial_spring ?? 0;
      if (rStr) {
        const rf = (r - (n.physics.target_radius ?? 100)) * rStr * alpha;
        n.vx -= (dx / r) * rf;
        n.vy -= (dy / r) * rf;
      }
    }
  }

  force.initialize = ns => {
    _asfNodes = ns;
    _nodeById.clear();
    for (const n of ns) _nodeById.set(n.id, n);
    _rebuildAngles();
  };
  force.update = () => _rebuildAngles();
  return force;
}

// ── Simulation ─────────────────────────────────────────────────────────────

const sim = d3.forceSimulation()
  .force("link", d3.forceLink().id(d => d.id)
    .distance(d => d.target.physics.target_radius)
    .strength(d => d.target.physics.link_strength)
  )
  .force("charge",  d3.forceManyBody()
    .strength(d => d.physics.charge)
    .distanceMax(SIM.chargeDistMax)
  )
  .force("collide",  d3.forceCollide().radius(d => radius(d) + d.physics.collide_pad))
  .force("center",   d3.forceCenter(0, 0).strength(SIM.centerStrength))
  .force("angular",  angularSpringForce())
  .alphaDecay(SIM.alphaDecay)
  .velocityDecay(SIM.velocityDecay)
  .on("tick", tick);

// ── Graph state ────────────────────────────────────────────────────────────

let gNodes = [];    // D3 node objects (augmented with x/y/vx/vy by sim)
let gLinks = [];    // D3 link objects (source/target resolved to node objects)

const posCache = {};          // id → {x,y} — preserves positions across resets
const linkSet  = new Set();   // "srcId~tgtId" keys — prevents duplicate edges

// ── Node rendering ─────────────────────────────────────────────────────────

function applyLabel(sel) {
  sel.each(function(d) {
    const t     = d3.select(this).text(null);
    const lines = d.rendering.label_lines?.length > 1 ? d.rendering.label_lines : null;
    if (lines) {
      t.attr("dy", radius(d) + 6);
      lines.forEach((ln, i) => {
        const s = t.append("tspan").attr("x", 0).text(ln);
        if (i > 0) s.attr("dy", "1.1em");
      });
    } else {
      t.attr("dy", radius(d) + 9).text(truncate(d.rendering.label, 16));
    }
  });
}

function _attachHandlers(sel) {
  sel
    .call(d3.drag()
      .on("start", function(e, d) {
        this._dragged = false;
        if (!e.active) sim.alphaTarget(SIM.dragAlpha).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on("drag",  function(e, d) { this._dragged = true; d.fx = e.x; d.fy = e.y; })
      .on("end",   function(e, d) {
        if (!e.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    )
    .on("click", function(e, d) {
      e.stopPropagation();
      if (this._dragged) return;
      _postExplore(d.id);
    })
    .on("mousemove",  (e, d) => showTip(e, d))
    .on("mouseleave", ()     => { tipEl.style.display = "none"; _tipNode = null; });
}

// Append a new node group to the SVG immediately (live insert, no full redraw).
function liveAddNode(nd) {
  const g = nodeG.append("g").attr("class", "node").datum(nd)
    .attr("transform", `translate(${nd.x},${nd.y})`);
  _attachHandlers(g);
  g.append("circle")
    .attr("r",      radius(nd))
    .attr("fill",   colour(nd))
    .attr("stroke", "#0a0a0a");
  applyLabel(g.append("text"));
}

// Append a new link line to the SVG immediately.
function liveAddEdge(link) {
  linkStyle(linkG.append("line").attr("class", "link").datum(link));
}

// ── Physics helpers ─────────────────────────────────────────────────────────

// Rebind the simulation every SIM.nudgeBatch new nodes and inject a capped
// alpha burst.  The cap prevents blob collapse that bare sim.restart()
// (alpha → 1) caused during large cascades.
let _nudgeCount = 0;
function nudgePhysics() {
  if (++_nudgeCount % SIM.nudgeBatch === 0) {
    sim.nodes(gNodes);
    sim.force("link").links(gLinks);
    sim.force("angular").update();
    sim.alpha(Math.max(sim.alpha(), SIM.nudgeAlpha)).restart();
  }
}

// ── Graph core ──────────────────────────────────────────────────────────────


// Add an edge between two nodes, deduplicating by node-ID pair.
function addEdge(srcId, tgtId, attrs = {}) {
  const key = `${srcId}~${tgtId}`;
  if (linkSet.has(key) || linkSet.has(`${tgtId}~${srcId}`)) return null;
  linkSet.add(key);
  const src = gNodes.find(n => n.id === srcId);
  const tgt = gNodes.find(n => n.id === tgtId);
  if (!src || !tgt) return null;
  const link = { source: src, target: tgt, ...attrs };
  gLinks.push(link);
  return link;
}

// Add a child node (and its edge to parent) to the live graph.
// Returns true if the node was new, false if it already existed (edge-only add).
function addChild(child, parentId) {
  const attrs    = child.run_length ? { run_length: child.run_length } : {};
  const existing = gNodes.find(n => n.id === child.id);

  if (!existing) {
    const parent = gNodes.find(n => n.id === parentId);
    // Orphan guard: parent must exist for new nodes.  Without this, stale
    // SSE events from before a reset create unattached floating nodes.
    if (!parent) return false;
    const prev   = posCache[child.id];    // reuse last known position if available
    let nd;

    const spread = child.physics.child_spread;
    if (prev) {
      nd = { ...child, x: prev.x, y: prev.y, vx: 0, vy: 0 };
    } else if (parent) {
      const θ = Math.random() * 2 * Math.PI;
      const r = spread * (0.5 + 0.5 * Math.random());
      nd = { ...child, x: parent.x + r * Math.cos(θ), y: parent.y + r * Math.sin(θ), vx: 0, vy: 0 };
    } else {
      nd = { ...child, x: (Math.random() - 0.5) * 600, y: (Math.random() - 0.5) * 600, vx: 0, vy: 0 };
    }
    if (child.physics.fx != null) nd.fx = child.physics.fx;
    if (child.physics.fy != null) nd.fy = child.physics.fy;

    gNodes.push(nd);
    liveAddNode(nd);
    const link = addEdge(parentId, child.id, attrs);
    if (link) liveAddEdge(link);
    nudgePhysics();
    return true;
  } else {
    const link = addEdge(parentId, child.id, attrs);
    if (link) liveAddEdge(link);
    return false;
  }
}

// ── SSE client ─────────────────────────────────────────────────────────────
//
// The server pushes these event types:
//   node      — one new node streamed as it is created; parent_id links it to its parent
//   status    — in-progress update with queue depth
//   done      — queue empty, all workers idle
//   heartbeat — keepalive (ignored)

let _sse = null;

function _setupSSE() {
  if (_sse) _sse.close();
  _sse = new EventSource("/stream");
  _sse._ready = new Promise(res => _sse.addEventListener("open", res, { once: true }));
  _sse.addEventListener("node", e => {
    const data = JSON.parse(e.data);
    if (!gNodes.find(n => n.id === data.id)) {
      if (data.physics.fx != null) {
        const nd = { ...data, x: data.physics.fx, y: data.physics.fy,
                               fx: data.physics.fx, fy: data.physics.fy };
        gNodes.push(nd);
        svg.call(zoomBeh.transform, d3.zoomIdentity.translate(W() / 2, H() / 2).scale(1));
        redraw();
      } else {
        addChild(data, data.parent_id);
      }
    }
    // nudgePhysics() inside addChild only fires every nudgeBatch nodes.
    // Always rebind here so small expansions (< nudgeBatch) still get physics.
    sim.nodes(gNodes);
    sim.force("link").links(gLinks);
    sim.alpha(Math.max(sim.alpha(), SIM.nudgeAlpha)).restart();
  });

  _sse.addEventListener("console", e => {
    const data = JSON.parse(e.data);
    if (data.msg === ".") conDot(); else conLog(data.msg);
  });

  _sse.addEventListener("expanded", e => {
    const data = JSON.parse(e.data);
    if (data.label) actLog(data.label, data.error ? "error" : "done");
    if (data.error) {
      conLog(`✗ ${data.label || data.id}: ${data.error}`, "error");
      if (data.trace) conLog(data.trace, "trace");
    }
    nodeG.selectAll("g.node").filter(d => d.id === data.id)
      .select("circle").attr("stroke", data.error ? "#f44" : "#0a0a0a");
  });

  _sse.addEventListener("status", e => {
    const data = JSON.parse(e.data);
    setStatus(`${gNodes.length} nodes · ${gLinks.length} edges · ${data.queued} queued`);
    updateQBar(data.queued);
  });

  _sse.addEventListener("done", () => {
    setStatus(`Done. ${gNodes.length} nodes · ${gLinks.length} edges`);
    updateQBar(0);
  });

  _sse.addEventListener("heartbeat", () => {});

  _sse.onerror = () => setStatus("Connection lost — is server.py still running?");
}

_setupSSE();

// ── Server API wrappers ─────────────────────────────────────────────────────

// Walk gLinks outward from rootId, returning node IDs at exactly `depth` hops.
function _bfsToDepth(rootId, depth) {
  const visited = new Set([rootId]);
  let frontier = [rootId];
  for (let d = 0; d < depth; d++) {
    const next = [];
    for (const id of frontier) {
      for (const link of gLinks) {
        const srcId = link.source?.id ?? link.source;
        const tgtId = link.target?.id ?? link.target;
        if (srcId === id && !visited.has(tgtId)) {
          visited.add(tgtId);
          next.push(tgtId);
        }
      }
    }
    if (next.length === 0) return [];
    frontier = next;
  }
  return frontier;
}

// POST to /explore/<id> — user-initiated node expansion.
function _postExplore(nodeId) {
  const nd = gNodes.find(n => n.id === nodeId);
  if (nd) actLog(nd.rendering.label, "pending");
  nodeG.selectAll("g.node").filter(d => d.id === nodeId)
    .select("circle")
    .attr("fill", "#fff")
    .transition().duration(350).ease(d3.easeCubicOut)
    .attr("fill", d => colour(d));
  fetch(`/explore/${nodeId}`, { method: "POST" }).catch(() => {});
}

// POST to a control endpoint (pause / resume / stop).
function _postCmd(cmd) {
  fetch(`/${cmd}`, { method: "POST" }).catch(() => {});
}

// ── Toolbar controls ────────────────────────────────────────────────────────

let _paused = false;   // mirrors server pause state for button label/class

function togglePause() {
  _paused = !_paused;
  const btn = document.getElementById("pause-btn");
  btn.textContent = _paused ? "Resume" : "Pause";
  btn.classList.toggle("paused", _paused);
  _postCmd(_paused ? "pause" : "resume");
}

function stopCascade() {
  _paused = false;
  const btn = document.getElementById("pause-btn");
  btn.textContent = "Pause";
  btn.classList.remove("paused");
  _postCmd("stop");
  setStatus(`Stopped. ${gNodes.length} nodes · ${gLinks.length} edges`);
  updateQBar(0);
}

// ── Full redraw ─────────────────────────────────────────────────────────────
//
// Called after resetGraph() clears the arrays, and after chart mode changes.
// Live adds (liveAddNode/liveAddEdge) are used during streaming; this is only
// for full re-renders from scratch.

function redraw() {
  const lSel = linkG.selectAll("line.link")
    .data(gLinks, d => `${d.source.id ?? d.source}~${d.target.id ?? d.target}`);
  linkStyle(lSel.enter().append("line").attr("class", "link"));
  lSel.exit().remove();

  const nSel   = nodeG.selectAll("g.node").data(gNodes, d => d.id);
  const nEnter = nSel.enter().append("g").attr("class", "node");
  _attachHandlers(nEnter);
  nEnter.append("circle");
  nEnter.append("text");
  nSel.merge(nEnter)
    .attr("transform", d => `translate(${d.x ?? 0},${d.y ?? 0})`);
  nSel.merge(nEnter).select("circle")
    .attr("r",      d => radius(d))
    .attr("fill",   d => colour(d))
    .attr("stroke", d => d.error ? "#f44" : "#0a0a0a");
  applyLabel(nSel.merge(nEnter).select("text"));
  nSel.exit().remove();

  sim.nodes(gNodes);
  sim.force("link").links(gLinks);
  sim.alpha(SIM.dragAlpha).restart();
  updateQBar(0);
}

function tick() {
  // Strict spoke constraint — runs after D3 has already applied velocities to
  // positions, so this correction sticks for both rendering and the next step.
  for (const n of _asfNodes) {
    const parent = n.parent_id != null ? _nodeById.get(n.parent_id) : null;
    if (!parent || (parent.physics?.angle_spring ?? 0) < 5) continue;
    const homeAngle = _siblingAngles.get(n.id);
    if (homeAngle == null) continue;
    const dx = n.x - parent.x, dy = n.y - parent.y;
    const r  = Math.sqrt(dx * dx + dy * dy) || (n.physics?.target_radius ?? 100);
    // Project velocity onto radial axis; zero the tangential component.
    const vr = n.vx * (dx / r) + n.vy * (dy / r);
    n.x  = parent.x + r * Math.cos(homeAngle);
    n.y  = parent.y + r * Math.sin(homeAngle);
    n.vx = vr * Math.cos(homeAngle);
    n.vy = vr * Math.sin(homeAngle);
  }

  // Save positions every tick so they survive a graph reset.
  gNodes.forEach(d => { posCache[d.id] = { x: d.x, y: d.y }; });

  linkG.selectAll("line.link")
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

  nodeG.selectAll("g.node")
    .attr("transform", d => `translate(${d.x},${d.y})`);
}

// ── UI helpers ──────────────────────────────────────────────────────────────

// Strip leading "The " and truncate with ellipsis.
function truncate(s, n) {
  s = (s || "").replace(/^The\s+/i, "");
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

const _actMap = new Map();
function actLog(lbl, st) {
  _actMap.set(lbl, st);
  const entries = [..._actMap.entries()].slice(-20);
  actEl.innerHTML = entries.map(([l, s]) =>
    `<div class="act-row"><span class="act-lbl">${l}</span><span class="act-s-${s}">${s}</span></div>`
  ).join("");
  actEl.scrollTop = actEl.scrollHeight;
}

function setStatus(msg)         { statusEl.textContent = msg; }
function updateQBar(queued = 0) { qBar.textContent = queued > 0 ? `${queued} queued` : ""; }

// ── Console panel ────────────────────────────────────────────────────────────

const conLines = document.getElementById("console-lines");
let _dotLine = null;  // current dot-accumulator element, or null

function conLog(msg, cls = "info") {
  _dotLine = null;  // next dot starts a fresh line
  const line = document.createElement("div");
  line.className = `con-line ${cls}`;
  line.textContent = msg;
  conLines.appendChild(line);
  conLines.scrollTop = conLines.scrollHeight;
}

function conDot() {
  if (!_dotLine) {
    _dotLine = document.createElement("div");
    _dotLine.className = "con-line cached";
    conLines.appendChild(_dotLine);
  }
  _dotLine.textContent += ".";
  conLines.scrollTop = conLines.scrollHeight;
}

// ── Tooltip ─────────────────────────────────────────────────────────────────
//
// For release nodes that haven't been expanded yet, silently fetch chart stats
// via GET /stats/<id> and refresh the tooltip if still open.

let _tipNode = null, _tipEvent = null;

function showTip(e, d) {
  tipEl.style.display = "block";

  // Lazy-fetch runs for releases not yet expanded — tooltip grows once loaded.
  if (d.rendering.stats_stale && !d._statsFetching) {
    d._statsFetching = true;
    fetch(`/stats/${d.id}`).then(r => r.json()).then(s => {
      if (s.tooltip) {
        d.rendering.tooltip     = s.tooltip;
        d.rendering.stats_stale = s.stats_stale ?? false;
        if (_tipNode === d) showTip(_tipEvent, d);
      }
    }).catch(() => {});
  }

  _tipNode  = d;
  _tipEvent = e;

  // Position tooltip near cursor, flipping if it would overflow the canvas.
  const r  = document.getElementById("canvas").getBoundingClientRect();
  let tx   = e.clientX - r.left + 14;
  let ty   = e.clientY - r.top  + 14;
  if (tx + 230 > r.width)  tx = e.clientX - r.left - 240;
  if (ty + 70  > r.height) ty = e.clientY - r.top  - 80;
  tipEl.style.left = tx + "px";
  tipEl.style.top  = ty + "px";

  let html =
    `<div class="tip-type">${d.rendering.type_label}</div>` +
    `<div class="tip-title">${d.rendering.label || d.id}</div>`;

  for (const row of (d.rendering.tooltip || [])) {
    const valClass = "tip-value" + (row.small ? " small" : "");
    html += `<div class="tip-row">`;
    if (row.label) html += `<span class="tip-label">${row.label}</span>`;
    html += `<span class="${valClass}">${row.value}</span></div>`;
  }

  if (d.error)
    html += `<div class="tip-row"><span class="tip-value" style="color:#f44">Error</span></div>`;

  tipEl.innerHTML = html;
}

// ── Chart mode toggle ───────────────────────────────────────────────────────

let _chartMode = "both";

function setChart(mode) {
  if (mode === _chartMode) return;
  _chartMode = mode;
  document.getElementById("tog-albums").classList.toggle("active",  mode === "albums");
  document.getElementById("tog-singles").classList.toggle("active", mode === "singles");
  document.getElementById("tog-both").classList.toggle("active",    mode === "both");
  resetGraph();
}

// ── Artist search ───────────────────────────────────────────────────────────

const searchInput   = document.getElementById("search-input");
const searchResults = document.getElementById("search-results");
let _searchTimer = null;

// Debounce: fire the search 300 ms after the user stops typing.
searchInput.addEventListener("input", () => {
  clearTimeout(_searchTimer);
  const terms = searchInput.value.trim();
  if (!terms) { searchResults.style.display = "none"; return; }
  _searchTimer = setTimeout(async () => {
    const res  = await fetch(`/search?terms=${encodeURIComponent(terms)}`);
    const data = await res.json();
    const list = data.artists || [];
    if (!list.length) { searchResults.style.display = "none"; return; }
    searchResults.innerHTML = list.map(a =>
      `<div class="sr-item" data-path="${a.path}" data-name="${a.title}">${a.title}</div>`
    ).join("");
    searchResults.style.display = "block";
  }, 300);
});

// Close the results dropdown on any outside click.
document.addEventListener("click", e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target))
    searchResults.style.display = "none";
});

// Create an ArtistNode, attach it to the timeline root, then trigger expansion.
async function _addArtistItem(path, name) {
  const res  = await fetch(`/add-artist?path=${encodeURIComponent(path)}&name=${encodeURIComponent(name)}`);
  const data = await res.json();
  if (data.error || !data.node) return;
  const root = gNodes.find(n => n.physics.fx != null);
  addChild(data.node, root ? root.id : gNodes[0]?.id);
  _postExplore(data.node.id);
}

// Click on a result row to add just that artist.
searchResults.addEventListener("click", async e => {
  const item = e.target.closest(".sr-item");
  if (!item) return;
  searchResults.style.display = "none";
  searchInput.value = "";
  await _addArtistItem(item.dataset.path, item.dataset.name);
});

// Enter on the search box to add all results at once.
searchInput.addEventListener("keydown", async e => {
  if (e.key !== "Enter") return;
  const items = [...searchResults.querySelectorAll(".sr-item")];
  if (!items.length) return;
  searchResults.style.display = "none";
  searchInput.value = "";
  await Promise.all(items.map(item => _addArtistItem(item.dataset.path, item.dataset.name)));
});

async function restartServer() {
  const btn = document.getElementById("restart-btn");
  btn.disabled = true;
  setStatus("Restarting server…");
  try { await fetch("/restart", { method: "POST" }); } catch { /* process dies mid-response */ }
  // Poll until the server is back, then do a full graph reset.
  const poll = async () => {
    try {
      const r = await fetch("/root?chart=" + _chartMode, { signal: AbortSignal.timeout(1000) });
      if (r.ok) { btn.disabled = false; await resetGraph(); return; }
    } catch { /* still down */ }
    setTimeout(poll, 500);
  };
  setTimeout(poll, 800);
}

// ── Boot ────────────────────────────────────────────────────────────────────

async function resetGraph() {
  sim.stop();
  _nudgeCount = 0;

  // Clear all local graph state
  gNodes = [];
  gLinks = [];
  linkSet.clear();
  _actMap.clear();
  Object.keys(posCache).forEach(k => delete posCache[k]);

  // Reset pause button
  _paused = false;
  document.getElementById("pause-btn").textContent = "Pause";
  document.getElementById("pause-btn").classList.remove("paused");

  redraw();
  setStatus("Loading…");

  // Recreate the SSE connection so stale events from the old cascade are
  // discarded and can't create orphan nodes in the new graph.
  _setupSSE();
  await _sse._ready;   // ensure server has subscribed before /root triggers any BFS events

  try {
    await fetch(`/root?chart=${_chartMode}`);
    // The root node arrives via SSE and is placed by the "node" event handler.
    setStatus("Loading…");
  } catch {
    setStatus("Server error — is server.py running?");
  }
}

resetGraph();
</script>
